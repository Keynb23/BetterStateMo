# .github/workflows/main.yml

name: Vercel Deployment CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Set Vite's debug environment variable for more verbose logging
      DEBUG: vite:*

    steps:
      - name: Hard Checkout (Force clean git state)
        # Instead of actions/checkout@v4 directly, perform a manual clean clone
        run: |
          echo "Performing hard clone to ensure clean git state..."
          rm -rf BetterStateMo # Remove existing clone directory if it exists
          git clone https://github.com/${{ github.repository }}.git BetterStateMo
          cd BetterStateMo
          git checkout ${{ github.ref_name }}
          echo "Repository cloned and checked out."

      - name: Change directory to cloned repo
        run: cd BetterStateMo

      - name: Set up Node.js
        # Adjusting the working-directory for setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # Still no cache for this job
          # cache: 'npm'

      - name: Install dependencies (Ultra aggressive cleanup and targeted reinstall)
        # Run from the cloned directory
        run: |
          cd BetterStateMo
          echo "Performing ultra aggressive cleanup before npm install..."
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install --no-fund --no-audit
          echo "npm install completed."
          # Explicitly try reinstalling rollup if it seems related to native modules
          npm install rollup@latest --force # Force reinstall rollup to ensure its integrity
          echo "Rollup reinstall attempted."

      - name: Run tests
        run: |
          cd BetterStateMo
          npm test

      - name: Build application (Ultra Clean Vite cache and dist, then build with verbose logging)
        # Run from the cloned directory
        run: |
          cd BetterStateMo
          echo "Cleaning Vite build cache and output directory..."
          rm -rf node_modules/.vite
          rm -rf .vite
          rm -rf dist
          echo "Running Vite build with DEBUG mode..."
          # Set DEBUG env var again for good measure just before the build
          DEBUG=vite:* npm run build
          echo "Vite build completed."

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Variables (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.BetterState25 }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.BetterState25 }} --yes

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Variables (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.BetterState25 }}

      - name: Deploy to Vercel Preview
        id: deploy_step
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --token=${{ secrets.BetterState25 }} --yes)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app')
          echo "::set-output name=url::$DEPLOY_URL"

      - name: Comment on PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🎉 **Preview Deployment Ready!**
            You can view the changes at: ${{ steps.deploy_step.outputs.url }}
          github-token: ${{ secrets.GITHUB_TOKEN }}