# .github/workflows/main.yml

name: Vercel Deployment CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # We'll try without caching npm modules explicitly here,
          # as previous issues might be related to cache corruption.
          # cache: 'npm'

      - name: Install dependencies (Aggressive cleanup and standard install)
        run: |
          echo "Performing aggressive cleanup before npm install..."
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install --no-fund --no-audit # Add no-fund/no-audit for cleaner output, not functional fix
          echo "npm install completed."

      - name: Run tests
        run: npm test

      - name: Build application (Clean dist and force Vite re-parse)
        run: |
          echo "Cleaning Vite build output directory..."
          rm -rf dist
          echo "Running Vite build..."
          # Pass a flag to Vite's build command if available, or rely on clean install
          # Vite usually picks up changes naturally after node_modules refresh
          # If this still fails, we might need to look into Vite config or specific plugin interaction.
          npm run build
          echo "Vite build completed."

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Variables (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.BetterState25 }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.BetterState25 }} --yes

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Variables (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.BetterState25 }}

      - name: Deploy to Vercel Preview
        id: deploy_step
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --token=${{ secrets.BetterState25 }} --yes)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app')
          echo "::set-output name=url::$DEPLOY_URL"

      - name: Comment on PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🎉 **Preview Deployment Ready!**
            You can view the changes at: ${{ steps.deploy_step.outputs.url }}
          github-token: ${{ secrets.GITHUB_TOKEN }}