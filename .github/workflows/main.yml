# .github/workflows/main.yml

name: Vercel Deployment CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # Keep caching disabled for this job for max troubleshooting cleanliness
          # cache: 'npm'

      - name: Install dependencies (Aggressive cleanup and standard install)
        run: |
          echo "Performing aggressive cleanup before npm install..."
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install --no-fund --no-audit
          echo "npm install completed."

      - name: Run tests
        run: npm test

      - name: Debugging: List relevant directories before build
        run: | # <--- This 'run:' must be directly under the 'name:' for this step
          echo "--- Listing contents of src/pages/ ---"
          ls -F /home/runner/work/BetterStateMo/BetterStateMo/src/pages/
          echo "--- Listing contents of src/context/ ---"
          ls -F /home/runner/work/BetterStateMo/BetterStateMo/src/context/
          echo "--- Finding SingleServiceBtn.jsx recursively in src/ ---"
          find /home/runner/work/BetterStateMo/BetterStateMo/src/ -name "*SingleServiceBtn*"
          echo "--- Current working directory (should be repo root) ---"
          pwd
          echo "--- Listing contents of current directory ---"
          ls -F

      - name: Build application (Clean Vite cache and dist, then build)
        run: |
          echo "Cleaning Vite build cache and output directory..."
          rm -rf node_modules/.vite
          rm -rf .vite
          rm -rf dist
          echo "Running Vite build..."
          npm run build
          echo "Vite build completed."

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Variables (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.BetterState25 }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.BetterState25 }} --yes

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Variables (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.BetterState25 }}

      - name: Deploy to Vercel Preview
        id: deploy_step
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --token=${{ secrets.BetterState25 }} --yes)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app')
          echo "::set-output name=url::$DEPLOY_URL"

      - name: Comment on PR with preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🎉 **Preview Deployment Ready!**
            You can view the changes at: ${{ steps.deploy_step.outputs.url }}
          github-token: ${{ secrets.GITHUB_TOKEN }}